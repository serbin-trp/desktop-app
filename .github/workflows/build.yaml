name: Wails build

on:
  push:
    tags:
      # Match any new tag
      - "*"

env:
  # Necessary for most environments as build failure can occur due to OOM issues
  NODE_OPTIONS: "--max-old-space-size=4096"

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Failure in one platform build won't impact the others
      fail-fast: false
      matrix:
        build:
          - name: "trg"
            platform: "windows/amd64"
            os: "windows-latest"
            nsis: "true"
            artifact: "trg-windows-amd64"
          - name: "trg"
            platform: "darwin/universal"
            os: "macos-latest"
            nsis: "false"
            artifact: "trg-macos-universal"

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wails
        uses: host-uk/build/actions/build/wails2@v4.0.0
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          sign: false
          package: false
          go-version: "1.22"
          node-version: "20.12.2"
          nsis: ${{ matrix.build.nsis }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.artifact }}
          path: build/bin/**
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          while IFS= read -r -d '' file; do
            artifact_name=$(printf '%s' "$file" | cut -d/ -f2)
            base_name=$(basename "$file")

            case "$artifact_name:$base_name" in
              trg-windows-amd64:*.exe)
                cp "$file" "dist/trg-windows-amd64.exe"
                ;;
              trg-windows-amd64:trg)
                cp "$file" "dist/trg-windows-amd64.exe"
                ;;
              trg-macos-universal:*.zip|trg-macos-universal:*.pkg)
                cp "$file" "dist/$base_name"
                ;;
            esac
          done < <(find release-assets -type f -print0)

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/*
          overwrite_files: true
          fail_on_unmatched_files: true
